<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ley 594 - Juego de Combinación IUE</title>
    <!-- React y ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel para transformar JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
        
        body { font-family: 'Inter', sans-serif; }

        @keyframes matchPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes winPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        @keyframes confettiFall {
            0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(150px) rotate(720deg); opacity: 0; }
        }

        .match-pulse { animation: matchPulse 0.5s ease; }
        .shake { animation: shake 0.4s ease; }
        .slide-up { animation: slideUp 0.4s ease both; }
        .win-pulse { animation: winPulse 1.5s ease infinite; }
        .confetti-piece {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 2px;
            animation: confettiFall 1.5s ease forwards;
            pointer-events: none;
            z-index: 100;
        }

        .card-transition { transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // Componente de Iconos SVG Integrado (Evita errores de librerías externas)
        const Icon = ({ name, size = 24, className = "" }) => {
            const paths = {
                'landmark': <path d="m3 21 18 0M3 7l9-4 9 4M5 21V10M19 21V10M9 21V10M15 21V10M2 7l10-5 10 5" />,
                'folder-open': <path d="M2 17V4a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2zM2 9h20" />,
                'layers': (
                    <>
                        <path d="m12 2 10 5-10 5-10-5 10-5z" />
                        <path d="M2 17l10 5 10-5" />
                        <path d="M2 12l10 5 10-5" />
                    </>
                ),
                'calendar': (
                    <>
                        <rect width="18" height="18" x="3" y="4" rx="2" ry="2" />
                        <path d="M16 2v4M8 2v4M3 10h18" />
                    </>
                ),
                'archive': (
                    <>
                        <rect width="20" height="5" x="2" y="3" rx="1" />
                        <path d="M4 8v11a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8M10 12h4" />
                    </>
                ),
                'building': (
                    <>
                        <rect width="16" height="20" x="4" y="2" rx="2" ry="2" />
                        <path d="M9 22v-4h6v4M8 6h.01M16 6h.01M8 10h.01M16 10h.01M8 14h.01M16 14h.01M8 18h.01M16 18h.01" />
                    </>
                ),
                'clipboard-list': (
                    <>
                        <rect width="8" height="4" x="8" y="2" rx="1" ry="1" />
                        <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2M12 11h4M12 16h4M8 11h.01M8 16h.01" />
                    </>
                ),
                'users': (
                    <>
                        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                        <circle cx="9" cy="7" r="4" />
                        <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
                        <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                    </>
                ),
                'check-circle': <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14M22 4L12 14.01l-3-3" />,
                'lightbulb': <path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A5 5 0 0 0 8 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5M9 18h6M10 22h4" />,
                'rotate-ccw': <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8M3 3v5h5" />,
                'tag': <path d="M12 2H2v10l9.29 9.29c.94.94 2.48.94 3.42 0l6.58-6.58c.94-.94.94-2.48 0-3.42L12 2zM7 7h.01" />,
                'file-text': (
                    <>
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                        <polyline points="14 2 14 8 20 8" />
                        <line x1="16" y1="13" x2="8" y2="13" />
                        <line x1="16" y1="17" x2="8" y2="17" />
                        <polyline points="10 9 9 9 8 9" />
                    </>
                ),
                'info': (
                    <>
                        <circle cx="12" cy="12" r="10" />
                        <line x1="12" y1="16" x2="12" y2="12" />
                        <line x1="12" y1="8" x2="12.01" y2="8" />
                    </>
                ),
                'x': (
                    <>
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </>
                ),
                'award': (
                    <>
                        <circle cx="12" cy="8" r="7" />
                        <polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88" />
                    </>
                )
            };

            return (
                <svg 
                    xmlns="http://www.w3.org/2000/svg" 
                    width={size} 
                    height={size} 
                    viewBox="0 0 24 24" 
                    fill="none" 
                    stroke="currentColor" 
                    strokeWidth="2" 
                    strokeLinecap="round" 
                    strokeLinejoin="round" 
                    className={className}
                >
                    {paths[name] || null}
                </svg>
            );
        };

        const DATA = [
            { id: 0, term: "Ley 594 de 2000", def: "Marco legal que establece las reglas y principios generales que regulan la función archivística del Estado Colombiano.", hint: "Marco legal del Estado Colombiano.", icon: "landmark" },
            { id: 1, term: "Gestión Documental", def: "Conjunto de actividades administrativas y técnicas para la planificación, manejo y organización de documentos desde su origen.", hint: "Planificación y organización desde el origen.", icon: "folder-open" },
            { id: 2, term: "Archivo Total", def: "Concepto que hace referencia al proceso integral de los documentos en su ciclo vital: gestión, central e histórico.", hint: "Proceso integral y ciclo vital.", icon: "layers" },
            { id: 3, term: "TRD", def: "Listado de series y tipos documentales a los cuales se asigna el tiempo de permanencia en cada etapa del ciclo vital.", hint: "Tiempo de permanencia y series.", icon: "calendar" },
            { id: 4, term: "Función Archivística", def: "Actividades que comprenden desde la elaboración del documento hasta su eliminación o conservación permanente.", hint: "Desde la elaboración hasta la eliminación.", icon: "archive" },
            { id: 5, term: "Archivo Público", def: "Documentos pertenecientes a entidades oficiales o derivados de la prestación de un servicio público por privados.", hint: "Entidades oficiales o servicio público.", icon: "building" },
            { id: 6, term: "Inventario Documental", def: "Instrumento de control obligatorio para la administración pública que asegura el manejo de documentos en sus diferentes fases.", hint: "Instrumento de control obligatorio.", icon: "clipboard-list" },
            { id: 7, term: "Servidores Públicos", def: "Personas legalmente responsables de la organización, conservación, uso y manejo de los documentos públicos.", hint: "Personas responsables del manejo público.", icon: "users" }
        ];

        const COLORS = {
            naranja: '#F26522',
            azul: '#003366',
            verde: '#8CC63F',
            blanco: '#FFFFFF'
        };

        const App = () => {
            const [terms, setTerms] = useState([]);
            const [defs, setDefs] = useState([]);
            const [selectedTerm, setSelectedTerm] = useState(null);
            const [selectedDef, setSelectedDef] = useState(null);
            const [matched, setMatched] = useState(new Set());
            const [wrongPair, setWrongPair] = useState(null);
            const [attempts, setAttempts] = useState(0);
            const [hint, setHint] = useState(null);
            const [showWin, setShowWin] = useState(false);

            const shuffle = (array) => [...array].sort(() => Math.random() - 0.5);

            const initGame = useCallback(() => {
                setTerms(shuffle(DATA));
                setDefs(shuffle(DATA));
                setMatched(new Set());
                setSelectedTerm(null);
                setSelectedDef(null);
                setAttempts(0);
                setHint(null);
                setShowWin(false);
            }, []);

            useEffect(() => {
                initGame();
            }, [initGame]);

            const handleMatch = (tId, dId) => {
                setAttempts(prev => prev + 1);
                if (tId === dId) {
                    const newMatched = new Set(matched);
                    newMatched.add(tId);
                    setMatched(newMatched);
                    setSelectedTerm(null);
                    setSelectedDef(null);
                    if (newMatched.size === DATA.length) {
                        setTimeout(() => setShowWin(true), 600);
                    }
                } else {
                    setWrongPair([tId, dId]);
                    setTimeout(() => {
                        setWrongPair(null);
                        setSelectedTerm(null);
                        setSelectedDef(null);
                    }, 600);
                }
            };

            const selectTerm = (id) => {
                if (matched.has(id)) return;
                setSelectedTerm(id);
                if (selectedDef !== null) handleMatch(id, selectedDef);
            };

            const selectDef = (id) => {
                if (matched.has(id)) return;
                setSelectedDef(id);
                if (selectedTerm !== null) handleMatch(selectedTerm, id);
            };

            const showRandomHint = () => {
                const pending = DATA.filter(d => !matched.has(d.id));
                if (pending.length === 0) return;
                const pick = pending[Math.floor(Math.random() * pending.length)];
                setHint(`Pista para "${pick.term}": ${pick.hint}`);
            };

            const accuracy = attempts > 0 ? Math.round((matched.size / attempts) * 100) : 0;

            return (
                <div className="min-h-screen flex flex-col bg-slate-50">
                    {/* Header Institucional */}
                    <header className="px-8 py-5 flex flex-wrap items-center justify-between gap-4 shadow-lg text-white border-b-4" style={{ background: `linear-gradient(135deg, ${COLORS.azul} 0%, #004d99 100%)`, borderBottomColor: COLORS.naranja }}>
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 bg-white rounded-full flex items-center justify-center text-[#003366] font-black text-xl shadow-md">IUE</div>
                            <div>
                                <h1 className="text-xl font-bold tracking-tight uppercase">Combinación de Columnas</h1>
                                <p className="text-[10px] uppercase font-bold tracking-[0.2em] opacity-80">Ley 594 de 2000</p>
                            </div>
                        </div>
                        
                        <div className="flex items-center gap-4">
                            <div className="bg-white/10 rounded-xl px-4 py-2 flex items-center gap-3">
                                <Icon name="check-circle" size={20} className="text-orange-400" />
                                <span className="font-black text-lg">{matched.size} / {DATA.length}</span>
                            </div>
                            <button onClick={showRandomHint} className="p-2 bg-white/10 hover:bg-white/20 rounded-full transition-all">
                                <Icon name="lightbulb" size={24} />
                            </button>
                            <button onClick={initGame} className="p-2 bg-white/10 hover:bg-white/20 rounded-full transition-all">
                                <Icon name="rotate-ccw" size={24} />
                            </button>
                        </div>
                    </header>

                    {/* Progress Bar */}
                    <div className="w-full h-1.5 bg-slate-200">
                        <div 
                            className="h-full transition-all duration-700 ease-out" 
                            style={{ width: `${(matched.size / DATA.length) * 100}%`, backgroundColor: COLORS.verde }}
                        ></div>
                    </div>

                    <main className="flex-1 max-w-6xl mx-auto w-full p-6">
                        <p className="text-center text-slate-500 text-sm mb-8 font-medium">
                            Relaciona el <strong style={{ color: COLORS.naranja }}>término</strong> con su <strong style={{ color: COLORS.naranja }}>definición</strong> correcta.
                        </p>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 relative">
                            {/* Column Terms */}
                            <div className="space-y-3">
                                <h3 className="flex items-center gap-2 text-xs font-black text-slate-400 uppercase tracking-widest px-2 mb-4">
                                    <Icon name="tag" size={14} /> Términos
                                </h3>
                                {terms.map((item, idx) => (
                                    <div
                                        key={item.id}
                                        onClick={() => selectTerm(item.id)}
                                        className={`
                                            card-transition p-4 rounded-2xl border-2 flex items-center gap-4 cursor-pointer select-none slide-up
                                            ${matched.has(item.id) ? 'bg-green-50 border-green-200 opacity-60 pointer-events-none' : 
                                              selectedTerm === item.id ? 'bg-orange-50 border-[#F26522] shadow-md scale-[1.02]' : 
                                              wrongPair && wrongPair[0] === item.id ? 'bg-red-50 border-red-500 shake' : 'bg-white border-transparent hover:border-slate-200 shadow-sm'}
                                        `}
                                        style={{ animationDelay: `${idx * 50}ms` }}
                                    >
                                        <div className={`p-2 rounded-lg ${matched.has(item.id) ? 'bg-green-500 text-white' : 'bg-orange-100 text-[#F26522]'}`}>
                                            <Icon name={item.icon} size={18} />
                                        </div>
                                        <span className={`font-bold text-sm ${matched.has(item.id) ? 'text-green-700' : 'text-slate-700'}`}>
                                            {item.term}
                                        </span>
                                    </div>
                                ))}
                            </div>

                            {/* Column Definitions */}
                            <div className="space-y-3">
                                <h3 className="flex items-center gap-2 text-xs font-black text-slate-400 uppercase tracking-widest px-2 mb-4">
                                    <Icon name="file-text" size={14} /> Definiciones
                                </h3>
                                {defs.map((item, idx) => (
                                    <div
                                        key={item.id}
                                        onClick={() => selectDef(item.id)}
                                        className={`
                                            card-transition p-4 rounded-2xl border-2 cursor-pointer select-none slide-up min-h-[80px] flex items-center
                                            ${matched.has(item.id) ? 'bg-green-50 border-green-200 opacity-60 pointer-events-none' : 
                                              selectedDef === item.id ? 'bg-orange-50 border-[#F26522] shadow-md scale-[1.02]' : 
                                              wrongPair && wrongPair[1] === item.id ? 'bg-red-50 border-red-500 shake' : 'bg-white border-transparent hover:border-slate-200 shadow-sm'}
                                        `}
                                        style={{ animationDelay: `${idx * 50 + 100}ms` }}
                                    >
                                        <span className={`text-xs leading-relaxed font-medium ${matched.has(item.id) ? 'text-green-700' : 'text-slate-600'}`}>
                                            {item.def}
                                        </span>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Hint Panel */}
                        {hint && (
                            <div className="mt-10 p-4 bg-orange-50 border-2 border-orange-200 rounded-2xl flex items-start gap-4 animate-in slide-in-from-bottom-4 duration-300">
                                <Icon name="info" className="text-[#F26522] mt-1" />
                                <div className="flex-1">
                                    <h4 className="font-bold text-orange-800 text-sm mb-1">Pista</h4>
                                    <p className="text-xs text-orange-700 italic">{hint}</p>
                                </div>
                                <button onClick={() => setHint(null)} className="text-orange-300 hover:text-orange-500">
                                    <Icon name="x" size={18} />
                                </button>
                            </div>
                        )}
                    </main>

                    {/* Win Modal */}
                    {showWin && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-sm animate-in fade-in duration-500">
                            <div className="bg-white rounded-[40px] p-10 max-w-md w-full text-center shadow-2xl slide-up">
                                <div className="win-pulse mb-8 inline-block">
                                    <div className="w-24 h-24 rounded-full flex items-center justify-center text-white shadow-xl" style={{ background: `linear-gradient(135deg, ${COLORS.naranja}, #ff8c42)` }}>
                                        <Icon name="award" size={48} />
                                    </div>
                                </div>
                                <h2 className="text-3xl font-black mb-2 text-[#003366]">¡Victoria Total!</h2>
                                <p className="text-slate-500 text-sm mb-8 italic">Has adquirido conocimientos básicos sobre los conceptos de la Ley 594 de 2000.</p>
                                
                                <div className="grid grid-cols-2 gap-4 mb-8">
                                    <div className="bg-slate-50 p-4 rounded-3xl">
                                        <span className="text-[10px] font-black text-slate-400 uppercase block mb-1">Intentos</span>
                                        <span className="text-2xl font-black text-[#003366]">{attempts}</span>
                                    </div>
                                    <div className="bg-slate-50 p-4 rounded-3xl">
                                        <span className="text-[10px] font-black text-slate-400 uppercase block mb-1">Precisión</span>
                                        <span className="text-2xl font-black text-[#8CC63F]">{accuracy}%</span>
                                    </div>
                                </div>

                                <button 
                                    onClick={initGame}
                                    className="w-full py-5 rounded-full text-white font-black text-lg shadow-xl hover:scale-105 active:scale-95 transition-all"
                                    style={{ backgroundColor: COLORS.naranja }}
                                >
                                    VOLVER A JUGAR
                                </button>
                                <p className="mt-6 text-[10px] font-bold text-slate-300 uppercase tracking-widest">Institución Universitaria de Envigado</p>
                            </div>
                        </div>
                    )}

                    <footer className="bg-white p-6 border-t border-slate-100 flex flex-col items-center gap-2">
                        <div className="flex items-center gap-4">
                            <div className="h-[2px] w-8 bg-[#F26522]"></div>
                            <p className="text-[10px] font-black text-gray-400 uppercase tracking-[0.4em]">IUE • @iueoficial</p>
                            <div className="h-[2px] w-8 bg-[#003366]"></div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
