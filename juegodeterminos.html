<!doctype html>
<html lang="es" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ley 594 - Juego de Combinación</title>
  <!-- Scripts Externos -->
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <style>
    * { font-family: 'Kanit', sans-serif; }

    /* Animaciones */
    @keyframes matchPulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.04); }
      100% { transform: scale(1); }
    }
    @keyframes confettiFall {
      0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(120px) rotate(720deg); opacity: 0; }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes winPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    .match-pulse { animation: matchPulse 0.5s ease; }
    .slide-up { animation: slideUp 0.4s ease both; }
    .fade-in { animation: fadeIn 0.3s ease both; }
    .win-pulse { animation: winPulse 1s ease infinite; }

    /* Tarjetas de Términos */
    .term-card {
      transition: all 0.25s ease;
      cursor: pointer;
      border-left: 4px solid transparent;
    }
    .term-card:hover:not(.matched):not(.selected) {
      border-left-color: #FF801F;
      background: #FFF7F0;
    }
    .term-card.selected {
      border-left-color: #FF801F;
      background: #FFF0E0;
      box-shadow: 0 2px 12px rgba(255,128,31,0.15);
    }
    .term-card.matched {
      border-left-color: #22c55e;
      background: #f0fdf4;
      opacity: 0.7;
      pointer-events: none;
    }

    /* Tarjetas de Definiciones */
    .def-card {
      transition: all 0.25s ease;
      cursor: pointer;
      border-right: 4px solid transparent;
    }
    .def-card:hover:not(.matched):not(.selected) {
      border-right-color: #FF801F;
      background: #FFF7F0;
    }
    .def-card.selected {
      border-right-color: #FF801F;
      background: #FFF0E0;
      box-shadow: 0 2px 12px rgba(255,128,31,0.15);
    }
    .def-card.matched {
      border-right-color: #22c55e;
      background: #f0fdf4;
      opacity: 0.7;
      pointer-events: none;
    }
    .def-card.wrong, .term-card.wrong {
      animation: shake 0.4s ease;
      background: #fef2f2 !important;
      border-color: #ef4444 !important;
    }

    .hint-btn { transition: all 0.2s ease; }
    .hint-btn:hover { background: #FF801F; color: white; }

    .confetti-piece {
      position: fixed;
      width: 8px;
      height: 8px;
      border-radius: 2px;
      animation: confettiFall 1.5s ease forwards;
      pointer-events: none;
      z-index: 999;
    }

    .progress-fill { transition: width 0.6s ease; }

    .icon-badge {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .toast-msg {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      animation: slideUp 0.3s ease, fadeOut 0.4s ease 2.2s forwards;
    }
    @keyframes fadeOut {
      to { opacity: 0; transform: translateX(-50%) translateY(10px); }
    }

    body { box-sizing: border-box; }
  </style>
 </head>
 <body class="h-full">
  <div id="app" class="h-full w-full bg-white overflow-auto">
   <!-- Header -->
   <header class="w-full" style="background: linear-gradient(135deg, #FF801F 0%, #FF9A4A 100%);">
    <div class="max-w-5xl mx-auto px-4 py-5 flex items-center justify-between flex-wrap gap-4">
     <div class="flex items-center gap-3 flex-1">
      <img src="https://www.iue.edu.co/wp-content/uploads/2022/05/institucion-universitaria-envigado-iue-logo.svg" alt="IUE Logo" style="height:44px;width:auto;filter:brightness(0) invert(1);" onerror="this.style.display='none';">
      <div class="border-r border-white/30 h-11"></div>
      <div>
       <h1 id="gameTitle" class="text-white text-xl font-medium tracking-wide" style="font-weight:300;">Ley 594 de 2000 — Combinación de Columnas</h1>
       <p class="text-white/80 text-xs font-light">Ley General de Archivos · Colombia</p>
      </div>
     </div>
     <div class="flex items-center gap-3">
      <div id="scoreDisplay" class="bg-white/20 rounded-lg px-3 py-1.5 text-white text-sm font-light flex items-center gap-2">
       <i data-lucide="check-circle" style="width:16px;height:16px;"></i> <span id="scoreText">0 / 8</span>
      </div>
      <button id="hintBtn" class="hint-btn bg-white/20 rounded-lg px-3 py-1.5 text-white text-sm font-light flex items-center gap-2" onclick="showHint()"> 
        <i data-lucide="lightbulb" style="width:16px;height:16px;"></i> Pista 
      </button> 
      <button class="bg-white/20 rounded-lg px-3 py-1.5 text-white text-sm font-light flex items-center gap-2" onclick="resetGame()"> 
        <i data-lucide="rotate-ccw" style="width:16px;height:16px;"></i> Reiniciar 
      </button>
     </div>
    </div>
    <!-- Progress bar -->
    <div class="w-full h-1.5 bg-white/20">
     <div id="progressBar" class="progress-fill h-full" style="width:0%; background:#fff;"></div>
    </div>
   </header>

   <!-- Instructions -->
   <div class="max-w-5xl mx-auto px-4 pt-5 pb-2">
    <p class="text-gray-500 text-sm font-light text-center">Selecciona un <strong style="color:#FF801F;">término</strong> a la izquierda y luego su <strong style="color:#FF801F;">definición</strong> correspondiente a la derecha.</p>
   </div>

   <!-- Game Area -->
   <main class="max-w-5xl mx-auto px-4 py-4">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 relative">
     <!-- Terms Column -->
     <div>
      <div class="flex items-center gap-2 mb-3 px-1">
       <div class="icon-badge" style="background:#FFF0E0;">
        <i data-lucide="tag" style="width:16px;height:16px;color:#FF801F;"></i>
       </div><span class="text-sm font-medium" style="color:#FF801F;">TÉRMINOS</span>
      </div>
      <div id="termsCol" class="flex flex-col gap-2.5"></div>
     </div>
     <!-- Definitions Column -->
     <div>
      <div class="flex items-center gap-2 mb-3 px-1">
       <div class="icon-badge" style="background:#FFF0E0;">
        <i data-lucide="file-text" style="width:16px;height:16px;color:#FF801F;"></i>
       </div><span class="text-sm font-medium" style="color:#FF801F;">DEFINICIONES</span>
      </div>
      <div id="defsCol" class="flex flex-col gap-2.5"></div>
     </div>
    </div>
   </main>

   <!-- Hint Panel -->
   <div id="hintPanel" class="hidden max-w-5xl mx-auto px-4 pb-4">
    <div class="rounded-lg border border-orange-200 bg-orange-50 p-4 fade-in">
     <div class="flex items-start gap-3">
      <i data-lucide="info" style="width:20px;height:20px;color:#FF801F;flex-shrink:0;margin-top:2px;"></i>
      <div>
       <p class="text-sm font-medium" style="color:#FF801F;">Pista</p>
       <p id="hintText" class="text-sm text-gray-600 font-light mt-1"></p>
      </div>
      <button onclick="document.getElementById('hintPanel').classList.add('hidden')" class="ml-auto text-gray-400 hover:text-gray-600"> 
        <i data-lucide="x" style="width:16px;height:16px;"></i> 
      </button>
     </div>
    </div>
   </div>

   <!-- Win Overlay -->
   <div id="winOverlay" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50 fade-in" style="backdrop-filter:blur(4px);">
    <div class="bg-white rounded-2xl p-8 max-w-md mx-4 text-center slide-up shadow-2xl">
     <div class="win-pulse inline-block mb-4">
      <div class="w-20 h-20 rounded-full flex items-center justify-center mx-auto" style="background:linear-gradient(135deg,#FF801F,#FF9A4A);">
       <i data-lucide="award" style="width:40px;height:40px;color:white;"></i>
      </div>
     </div>
     <h2 class="text-2xl font-medium text-gray-800 mb-2">¡Misión Cumplida!</h2>
     <p id="winMessage" class="text-gray-500 font-light mb-1">Cumplimiento normativo asegurado.</p>
     <p id="winStats" class="text-sm text-gray-400 font-light mb-6"></p>
     <button onclick="resetGame()" class="px-6 py-2.5 rounded-lg text-white font-light text-sm" style="background:#FF801F;"> Jugar de Nuevo </button>
    </div>
   </div>
  </div>

  <script>
    const DATA = [
      { id: 0, term: "Ley 594 de 2000", def: "Marco legal que establece las reglas y principios generales que regulan la función archivística del Estado Colombiano.", hint: "Palabras clave: marco legal, principios generales, Estado Colombiano.", icon: "landmark" },
      { id: 1, term: "Gestión Documental", def: "Conjunto de actividades administrativas y técnicas para la planificación, manejo y organización de documentos desde su origen.", hint: "Palabras clave: planificación, manejo, organización, origen del documento.", icon: "folder-open" },
      { id: 2, term: "Archivo Total", def: "Concepto que hace referencia al proceso integral de los documentos en su ciclo vital: gestión, central e histórico.", hint: "Palabras clave: ciclo vital, tres fases (gestión, central, histórico).", icon: "layers" },
      { id: 3, term: "Función de los Archivos", def: "Los archivos en un Estado de Derecho cumplen una función probatoria, garantizadora y perpetuadora.", hint: "Palabras clave: series documentales, tiempo de permanencia, retención.", icon: "calendar" },
      { id: 4, term: "Función Archivística", def: "Actividades que comprenden desde la elaboración del documento hasta su eliminación o conservación permanente.", hint: "Palabras clave: elaboración, eliminación, conservación permanente.", icon: "archive" },
      { id: 5, term: "Archivo Público", def: "Documentos pertenecientes a entidades oficiales o derivados de la prestación de un servicio público por entidades privadas.", hint: "Palabras clave: entidades oficiales, servicio público, privados.", icon: "building" },
      { id: 6, term: "Inventario Documental", def: "Instrumento de control obligatorio para la administración pública que asegura el manejo de documentos en sus diferentes fases.", hint: "Palabras clave: instrumento de control, obligatorio, administración pública.", icon: "clipboard-list" },
      { id: 7, term: "Servidores Públicos", def: "Personas legalmente responsables de la organización, conservación, uso y manejo de los documentos públicos.", hint: "Palabras clave: responsabilidad legal, conservación, documentos públicos.", icon: "users" }
    ];

    let selectedTerm = null;
    let selectedDef = null;
    let matched = new Set();
    let attempts = 0;
    
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function buildGame() {
      const shuffledTerms = shuffle(DATA);
      const shuffledDefs = shuffle(DATA);
      const termsCol = document.getElementById('termsCol');
      const defsCol = document.getElementById('defsCol');
      
      termsCol.innerHTML = '';
      defsCol.innerHTML = '';

      shuffledTerms.forEach((item, i) => {
        const el = document.createElement('div');
        el.className = 'term-card rounded-lg border border-gray-200 p-3 flex items-center gap-3 slide-up';
        el.style.animationDelay = `${i * 60}ms`;
        el.dataset.id = item.id;
        el.innerHTML = `
          <div class="icon-badge" style="background:#FFF0E0;">
            <i data-lucide="${item.icon}" style="width:16px;height:16px;color:#FF801F;"></i>
          </div>
          <span class="text-sm font-light text-gray-700">${item.term}</span>
        `;
        el.addEventListener('click', () => selectTerm(el, item.id));
        termsCol.appendChild(el);
      });

      shuffledDefs.forEach((item, i) => {
        const el = document.createElement('div');
        el.className = 'def-card rounded-lg border border-gray-200 p-3 slide-up';
        el.style.animationDelay = `${i * 60 + 30}ms`;
        el.dataset.id = item.id;
        el.innerHTML = `<span class="text-xs font-light text-gray-600 leading-relaxed">${item.def}</span>`;
        el.addEventListener('click', () => selectDef(el, item.id));
        defsCol.appendChild(el);
      });

      lucide.createIcons();
    }

    function selectTerm(el, id) {
      if (matched.has(id)) return;
      document.querySelectorAll('.term-card.selected').forEach(e => e.classList.remove('selected'));
      el.classList.add('selected');
      selectedTerm = id;
      tryMatch();
    }

    function selectDef(el, id) {
      if (matched.has(id)) return;
      document.querySelectorAll('.def-card.selected').forEach(e => e.classList.remove('selected'));
      el.classList.add('selected');
      selectedDef = id;
      tryMatch();
    }

    function tryMatch() {
      if (selectedTerm === null || selectedDef === null) return;
      attempts++;
      const tEl = document.querySelector(`.term-card[data-id="${selectedTerm}"]`);
      const dEl = document.querySelector(`.def-card[data-id="${selectedDef}"]`);

      if (selectedTerm === selectedDef) {
        matched.add(selectedTerm);
        tEl.classList.remove('selected');
        dEl.classList.remove('selected');
        tEl.classList.add('matched', 'match-pulse');
        dEl.classList.add('matched', 'match-pulse');
        updateScore();
        showToast("¡Correcto! Cumplimiento normativo asegurado");
        spawnConfetti(tEl);

        if (matched.size === DATA.length) {
          setTimeout(showWin, 800);
        }
      } else {
        tEl.classList.add('wrong');
        dEl.classList.add('wrong');
        setTimeout(() => {
          tEl.classList.remove('wrong', 'selected');
          dEl.classList.remove('wrong', 'selected');
        }, 600);
      }
      selectedTerm = null;
      selectedDef = null;
    }

    function updateScore() {
      document.getElementById('scoreText').textContent = `${matched.size} / ${DATA.length}`;
      document.getElementById('progressBar').style.width = `${(matched.size / DATA.length) * 100}%`;
    }

    function showToast(msg) {
      const old = document.querySelector('.toast-msg');
      if (old) old.remove();
      const t = document.createElement('div');
      t.className = 'toast-msg';
      t.innerHTML = `<div class="flex items-center gap-2 px-5 py-3 rounded-xl shadow-lg text-sm font-light text-white" style="background:#FF801F;">
        <i data-lucide="check-circle" style="width:18px;height:18px;"></i>
        <span>${msg}</span>
      </div>`;
      document.body.appendChild(t);
      lucide.createIcons();
      setTimeout(() => t.remove(), 2800);
    }

    function spawnConfetti(anchor) {
      const rect = anchor.getBoundingClientRect();
      const colors = ['#FF801F', '#FFB366', '#22c55e', '#fbbf24', '#f97316'];
      for (let i = 0; i < 12; i++) {
        const c = document.createElement('div');
        c.className = 'confetti-piece';
        c.style.left = `${rect.left + Math.random() * rect.width}px`;
        c.style.top = `${rect.top}px`;
        c.style.background = colors[Math.floor(Math.random() * colors.length)];
        c.style.animationDelay = `${Math.random() * 0.3}s`;
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 2000);
      }
    }

    function showHint() {
      const unmatched = DATA.filter(d => !matched.has(d.id));
      if (!unmatched.length) return;
      const pick = unmatched[Math.floor(Math.random() * unmatched.length)];
      document.getElementById('hintText').textContent = `"${pick.term}" → ${pick.hint}`;
      document.getElementById('hintPanel').classList.remove('hidden');
      lucide.createIcons();
    }

    function showWin() {
      const accuracy = Math.round((DATA.length / attempts) * 100);
      document.getElementById('winStats').textContent = `Intentos: ${attempts} · Precisión: ${accuracy}%`;
      document.getElementById('winOverlay').classList.remove('hidden');
      lucide.createIcons();
    }

    function resetGame() {
      matched.clear();
      selectedTerm = null;
      selectedDef = null;
      attempts = 0;
      updateScore();
      document.getElementById('winOverlay').classList.add('hidden');
      document.getElementById('hintPanel').classList.add('hidden');
      buildGame();
    }

    // Iniciar juego al cargar
    window.onload = () => {
      buildGame();
      lucide.createIcons();
    };
  </script>
 </body>
</html>
