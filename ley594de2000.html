<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ley 594 Flashcards - IUE</title>
    <!-- React y ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel para transformar JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc;
        }

        /* Estilos para la animación de las tarjetas */
        .card-container {
            perspective: 1200px;
        }
        .card-inner {
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-inner.flipped {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
        .card-back {
            transform: rotateY(180deg);
        }

        /* Animación de entrada de tarjeta */
        .slide-in {
            animation: slideIn 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .progress-dot {
            transition: all 0.3s ease;
        }
        .progress-dot.active {
            width: 24px;
            background-color: #F26522;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Componente de Iconos SVG Integrado (Evita errores de librerías externas)
        const Icon = ({ name, size = 24, className = "" }) => {
            const paths = {
                'graduation-cap': <path d="M22 10v6M2 10l10-5 10 5-10 5zM6 12v5c3 3 9 3 12 0v-5" />,
                'book': <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 19.5A2.5 2.5 0 0 0 6.5 22H20M4 4.5A2.5 2.5 0 0 1 6.5 2H20v15H6.5A2.5 2.5 0 0 0 4 19.5z" />,
                'layout-list': <path d="M10 5h10M10 12h10M10 19h10M4 5h1M4 12h1M4 19h1" />,
                'search': <path d="M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16zM21 21l-4.35-4.35" />,
                'building-2': <path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2M10 6h4M10 10h4M10 14h4M10 18h4" />,
                'file-text': <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8zM14 2v6h6M16 13H8M16 17H8M10 9H8" />,
                'database': <path d="M12 21a8 3 0 1 0 0-6 8 3 0 0 0 0 6zM12 15a8 3 0 1 0 0-6 8 3 0 0 0 0 6zM12 9a8 3 0 1 0 0-6 8 3 0 0 0 0 6zM4 6v12a8 3 0 0 0 16 0V6" />,
                'clipboard-check': <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2M9 2h6a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1H9a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1zM9 14l2 2 4-4" />,
                'users': <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" />,
                'list-check': <path d="M11 6l2 2 4-4M16 12H3M16 18H3M21 12H3M21 18H3" />,
                'shield-alert': <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10zM12 8v4M12 16h.01" />,
                'rotate-ccw': <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8M3 3v5h5" />,
                'chevron-left': <path d="m15 18-6-6 6-6" />,
                'chevron-right': <path d="m9 18 6-6-6-6" />,
                'check-circle': <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14M22 4L12 14.01l-3-3" />,
                'arrow-right': <path d="M5 12h14M12 5l7 7-7 7" />
            };

            return (
                <svg 
                    xmlns="http://www.w3.org/2000/svg" 
                    width={size} 
                    height={size} 
                    viewBox="0 0 24 24" 
                    fill="none" 
                    stroke="currentColor" 
                    strokeWidth="2" 
                    strokeLinecap="round" 
                    strokeLinejoin="round" 
                    className={className}
                >
                    {paths[name] || null}
                </svg>
            );
        };

        const COLORS = {
            naranja: '#F26522',
            azul: '#003366',
            verde: '#8CC63F',
            texto: '#1a1520'
        };

        const flashcards = [
            { question: "¿Cuál es el objeto de la Ley 594 de 2000?", answer: "Establecer las reglas y principios generales que regulan la función archivística del Estado.", icon: "book" },
            { question: "¿Qué comprende la 'gestión documental'?", answer: "Conjunto de actividades administrativas y técnicas tendientes a la planificación, manejo y organización de la documentación producida y recibida por las entidades, desde su origen hasta su destino final.", icon: "layout-list" },
            { question: "¿Cuál es el objetivo esencial de los archivos según la Ley 594 de 2000?", answer: "Disponer de la documentación organizada de tal forma que la información institucional sea recuperable para uso de la administración, en el servicio al ciudadano y como fuente para la historia.", icon: "search" },
            { question: "¿Cuál es la entidad del Estado encargada de orientar y coordinar la función archivística?", answer: "El Archivo General de la Nación AGN.", icon: "building-2" },
            { question: "¿Qué deben hacer los servidores públicos al desvincularse de sus funciones?", answer: "Entregar los documentos y archivos a su cargo debidamente inventariados, conforme a las normas y procedimientos que establezca el Archivo General de la Nación.", icon: "file-text" },
            { question: "¿Cómo se clasifican los archivos teniendo en cuenta el ciclo vital de los documentos?", answer: "Se clasifican en Archivo de gestión, Archivo central y Archivo histórico.", icon: "database" },
            { question: "¿Qué son las Tablas de Retención Documental (TRD)?", answer: "Listado de series y subseries con sus correspondientes tipos documentales, a las cuales se asigna un tiempo de permanencia en cada etapa del ciclo vital.", icon: "clipboard-check" },
            { question: "¿Quién tiene derecho a consultar los documentos de archivos públicos?", answer: "Todas las personas tienen derecho a consultar los documentos de archivos públicos y a que se les expida copia, siempre que no tengan carácter reservado.", icon: "users" },
            { question: "¿Qué es el inventario documental y cuál es su obligatoriedad?", answer: "Instrumento para asegurar el control de los documentos. Es obligación de las entidades de la Administración Pública elaborar inventarios de los documentos que produzcan.", icon: "list-check" },
            { question: "¿Qué documentos no pueden ser destruidos según la Ley 594 de 2000?", answer: "Los documentos originales que posean valores históricos no podrán ser destruidos, aun cuando hayan sido reproducidos mediante cualquier medio.", icon: "shield-alert" }
        ];

        const App = () => {
            const [currentIdx, setCurrentIdx] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);
            const [gameState, setGameState] = useState('intro'); // 'intro', 'playing'

            const nextCard = () => {
                setIsFlipped(false);
                setTimeout(() => {
                    setCurrentIdx((prev) => (prev + 1) % flashcards.length);
                }, 150);
            };

            const prevCard = () => {
                setIsFlipped(false);
                setTimeout(() => {
                    setCurrentIdx((prev) => (prev - 1 + flashcards.length) % flashcards.length);
                }, 150);
            };

            const resetCards = () => {
                setIsFlipped(false);
                setCurrentIdx(0);
            };

            return (
                <div className="min-h-screen flex flex-col bg-slate-50">
                    {/* Header Institucional */}
                    <header className="bg-white px-8 py-4 flex items-center justify-between shadow-md border-b-4" style={{ borderBottomColor: COLORS.naranja }}>
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 bg-[#F26522] rounded-full flex items-center justify-center text-white font-black text-xl shadow-lg">IUE</div>
                            <div>
                                <h1 className="text-xl font-black text-[#003366]">LEY 594 DE 2000</h1>
                                <p className="text-[10px] uppercase font-bold tracking-widest text-gray-400 italic">Ley General de Archivos</p>
                            </div>
                        </div>
                        <div className="hidden md:flex flex-col items-end">
                            <span className="text-[10px] font-bold text-gray-400 uppercase">Progreso</span>
                            <span className="text-2xl font-black text-[#003366]">{currentIdx + 1} / {flashcards.length}</span>
                        </div>
                    </header>

                    <main className="flex-1 flex flex-col items-center justify-center p-6 max-w-2xl mx-auto w-full">
                        {gameState === 'intro' ? (
                            <div className="w-full bg-white p-10 rounded-3xl shadow-2xl text-center border-t-8 border-[#003366]">
                                <div className="mb-8 inline-flex p-6 rounded-full bg-orange-50 text-[#F26522]">
                                    <Icon name="graduation-cap" size={64} />
                                </div>
                                <h2 className="text-3xl font-black mb-4 text-[#003366]">Conceptos Basicos</h2>
                                <p className="text-gray-600 mb-10 leading-relaxed text-lg">
                                    Aprende los conceptos fundamentales de la <strong>Ley General de Archivos</strong> con este sistema de tarjetas interactivas.
                                </p>
                                <button 
                                    onClick={() => setGameState('playing')}
                                    className="px-12 py-5 rounded-full text-white font-bold text-xl shadow-xl transition-all hover:scale-105 active:scale-95 flex items-center gap-3 mx-auto bg-[#F26522]"
                                >
                                    COMENZAR ESTUDIO <Icon name="arrow-right" size={24} />
                                </button>
                            </div>
                        ) : (
                            <div className="w-full flex flex-col items-center gap-8">
                                
                                <div className="text-center mb-2">
                                    <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full mb-3 bg-orange-50 border border-orange-100">
                                        <Icon name="graduation-cap" size={14} className="text-[#F26522]" />
                                        <span className="text-[10px] font-black uppercase tracking-wider text-[#F26522]">Material de Formación</span>
                                    </div>
                                    <p className="text-sm text-gray-400">Toca la tarjeta para ver la respuesta</p>
                                </div>

                                {/* Flashcard Component */}
                                <div className="card-container w-full aspect-[4/3] md:aspect-[16/9] max-h-[400px]">
                                    <div 
                                        className={`card-inner w-full h-full relative cursor-pointer ${isFlipped ? 'flipped' : ''}`}
                                        onClick={() => setIsFlipped(!isFlipped)}
                                    >
                                        {/* Front Side */}
                                        <div className="card-front absolute inset-0 bg-white rounded-3xl p-8 flex flex-col justify-between shadow-xl border-2 border-slate-100 slide-in">
                                            <div className="flex items-center gap-3">
                                                <div className="p-3 bg-orange-50 rounded-2xl">
                                                    <Icon name={flashcards[currentIdx].icon} size={24} className="text-[#F26522]" />
                                                </div>
                                                <span className="text-[10px] font-black uppercase text-gray-400 tracking-[0.2em]">Pregunta</span>
                                            </div>
                                            
                                            <h3 className="text-xl md:text-2xl font-bold text-[#003366] leading-tight text-center px-4">
                                                {flashcards[currentIdx].question}
                                            </h3>

                                            <div className="flex items-center justify-center gap-2 text-gray-300">
                                                <Icon name="rotate-ccw" size={12} />
                                                <span className="text-[10px] uppercase font-bold tracking-widest">Tocar para voltear</span>
                                            </div>
                                        </div>

                                        {/* Back Side */}
                                        <div className="card-back absolute inset-0 bg-[#F26522] rounded-3xl p-8 flex flex-col justify-between shadow-2xl text-white">
                                            <div className="flex items-center gap-3">
                                                <div className="p-3 bg-white/20 rounded-2xl">
                                                    <Icon name="check-circle" size={24} className="text-white" />
                                                </div>
                                                <span className="text-[10px] font-black uppercase text-white/70 tracking-[0.2em]">Respuesta Correcta</span>
                                            </div>

                                            <p className="text-lg md:text-xl font-medium leading-relaxed text-center px-4">
                                                {flashcards[currentIdx].answer}
                                            </p>

                                            <div className="flex items-center justify-center gap-2 text-white/50">
                                                <Icon name="rotate-ccw" size={12} />
                                                <span className="text-[10px] uppercase font-bold tracking-widest">Tocar para regresar</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Controls */}
                                <div className="flex items-center gap-6">
                                    <button 
                                        onClick={prevCard}
                                        className="w-14 h-14 rounded-full bg-white shadow-lg flex items-center justify-center text-[#F26522] hover:scale-110 active:scale-95 transition-all border border-slate-100"
                                    >
                                        <Icon name="chevron-left" size={32} />
                                    </button>
                                    
                                    <button 
                                        onClick={resetCards}
                                        className="w-10 h-10 rounded-full bg-slate-200 flex items-center justify-center text-slate-500 hover:bg-slate-300 transition-colors"
                                    >
                                        <Icon name="rotate-ccw" size={18} />
                                    </button>

                                    <button 
                                        onClick={nextCard}
                                        className="w-14 h-14 rounded-full bg-white shadow-lg flex items-center justify-center text-[#F26522] hover:scale-110 active:scale-95 transition-all border border-slate-100"
                                    >
                                        <Icon name="chevron-right" size={32} />
                                    </button>
                                </div>

                                {/* Progress Dots */}
                                <div className="flex gap-2">
                                    {flashcards.map((_, i) => (
                                        <div 
                                            key={i}
                                            className={`progress-dot h-2 rounded-full ${i === currentIdx ? 'active' : 'w-2 bg-slate-300'}`}
                                        />
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="bg-white p-6 border-t border-slate-100 flex flex-col items-center gap-2">
                        <div className="flex items-center gap-4">
                            <div className="h-[2px] w-8 bg-[#F26522]"></div>
                            <p className="text-[10px] font-black text-gray-400 uppercase tracking-[0.4em]">Institución Universitaria de Envigado</p>
                            <div className="h-[2px] w-8 bg-[#003366]"></div>
                        </div>
                        <p className="text-[9px] text-gray-300 font-bold italic uppercase tracking-widest">Vigilada Mineducación</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
