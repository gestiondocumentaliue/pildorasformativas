<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafío Gestión Documental IUE</title>
    <!-- React y ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel para transformar JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .modal-enter { animation: zoomIn 0.3s ease-out; }
        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Componente de Iconos SVG Integrado para evitar errores de librerías externas
        const Icon = ({ name, size = 24, className = "" }) => {
            const paths = {
                Gavel: <path d="m14.5 12.5-8 8a2.11 2.11 0 1 1-3-3l8-8m5 5 3 3-8 8-3-3 8-8m5-5 3 3-1 1-3-3zM7 7l3 3M9 5.5l2 2m-5-5L10 6" />,
                Lightbulb: <path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A5 5 0 0 0 8 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5M9 18h6M10 22h4" />,
                CheckCircle2: <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10zM9 12l2 2 4-4" />,
                AlertCircle: <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10zM12 8v4M12 16h.01" />,
                Trophy: <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M10 14.66V17c0 .55.45 1 1 1h2c.55 0 1-.45 1-1v-2.34M12 2c3.31 0 6 2.69 6 6v5a6 6 0 0 1-12 0V8c0-3.31 2.69-6 6-6z" />,
                RotateCcw: <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8M3 3v5h5" />,
                ArrowRight: <path d="M5 12h14M12 5l7 7-7 7" />,
                Info: <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10zM12 16v-4M12 8h.01" />,
                BookOpen: <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
            };

            return (
                <svg 
                    xmlns="http://www.w3.org/2000/svg" 
                    width={size} 
                    height={size} 
                    viewBox="0 0 24 24" 
                    fill="none" 
                    stroke="currentColor" 
                    strokeWidth="2" 
                    strokeLinecap="round" 
                    strokeLinejoin="round" 
                    className={className}
                >
                    {paths[name] || null}
                </svg>
            );
        };

        // Paleta Corporativa IUE
        const COLORS = {
            naranja: '#F26522',
            azul: '#003366',
            verde: '#8CC63F',
            azulClaro: '#E6F0F9',
            grisFondo: '#F8FAFC'
        };

        const DATA_SETS = [
            { id: 1, mito: '"El archivo es una bodega de papeles viejos que nadie usa."', realidad: 'Art. 4: El archivo es un instrumento de gestión y transparencia.', tip: 'Si está ordenado, es una herramienta de consulta rápida; si está tirado, es solo basura.' },
            { id: 2, mito: '"Puedo organizar mis carpetas como yo quiera, es mi oficina."', realidad: 'Art. 22: La organización documental debe seguir procesos técnicos archivìsticos.', tip: 'El orden institucional permite que cualquier compañero encuentre lo que necesita si tú no estás.' },
            { id: 3, mito: '"Si digitalizo el documento, puedo botar el papel original."', realidad: 'Art. 19: La eliminación solo se hace tras cumplir el tiempo de retenciòn en el Archivo Central.', tip: 'Digitalizar es para agilizar, pero el original es la prueba legal. ¡No lo destruyas sin permiso!' },
            { id: 4, mito: '"Cualquier caja o carpeta sirve para guardar documentos."', realidad: 'Art. 13: Las instalaciones y materiales deben garantizar la conservación de los documentos.', tip: 'Usa materiales libres de ácido. El rastro de hoy debe durar en el tiempo.' },
            { id: 5, mito: '"Los archivos solo le importan al encargado del archivo."', realidad: 'Art. 4: La responsabilidad de la gestión documental es de todos los funcionarios.', tip: 'Tu gestión de hoy es el legado que dejas a la institución mañana.' },
            { id: 6, mito: '"El archivo es el lugar de castigo para los funcionarios que no rinden."', realidad: 'Art. 4: El archivo constituye la memoria institucional y el patrimonio cultural.', tip: 'Mira el archivo como el cerebro de la institución, no como su sótano.' },
            { id: 7, mito: '"Solo se archiva lo que está firmado por el Rector."', realidad: 'Art. 3: Documento de archivo es el registro de información producida en ejercicio de funciones.', tip: 'Todo registro que evidencie una gestión, debe ser parte del expediente institucional.' },
            { id: 8, mito: '"Si se acaba el espacio, puedo llevarme los documentos a mi casa."', realidad: 'Art. 14: Los documentos públicos son inalienables e imprescriptibles.', tip: 'La información pública pertenece a la ciudadanía, no al escritorio personal del funcionario.' },
            { id: 9, mito: '"Las Tablas de Retención (TRD) son solo un requisito burocrático que no sirve."', realidad: 'Art. 24: Obligatoriedad de las TRD para todas las entidades.', tip: 'La TRD es el mapa que te dice cuánto tiempo permanece un documento en cada etapa de su ciclo vital.' },
            { id: 10, mito: '"Usar clips y cinta pegante ayuda a que no se pierdan las hojas."', realidad: 'Art. 11: Las entidades deben garantizar la integridad física de los documentos.', tip: 'El metal se oxida y la cinta se pudre; utiliza ganchos plásticos para proteger los documentos.' }
        ];

        const App = () => {
            const [deck, setDeck] = useState([]);
            const [placedMitos, setPlacedMitos] = useState([]);
            const [placedRealidades, setPlacedRealidades] = useState([]);
            const [revealedTips, setRevealedTips] = useState([]);
            const [activeTip, setActiveTip] = useState(null);
            const [score, setScore] = useState(0);
            const [gameState, setGameState] = useState('intro');
            const [feedback, setFeedback] = useState(null);

            useEffect(() => {
                prepareGame();
            }, []);

            const prepareGame = () => {
                const items = DATA_SETS.flatMap(set => [
                    { id: `m-${set.id}`, text: set.mito, type: 'MITO', setId: set.id, tip: set.tip },
                    { id: `r-${set.id}`, text: set.realidad, type: 'REALIDAD', setId: set.id, tip: set.tip }
                ]).sort(() => Math.random() - 0.5);

                setDeck(items);
                setPlacedMitos([]);
                setPlacedRealidades([]);
                setRevealedTips([]);
                setScore(0);
                setGameState('intro');
            };

            const onDragStart = (e, item) => {
                e.dataTransfer.setData('application/json', JSON.stringify(item));
            };

            const onDrop = (e, targetType) => {
                e.preventDefault();
                try {
                    const data = e.dataTransfer.getData('application/json');
                    if (!data) return;
                    const item = JSON.parse(data);
                    
                    if (item.type === targetType) {
                        setScore(s => s + 10);
                        if (targetType === 'MITO') setPlacedMitos(prev => [...prev, item]);
                        else setPlacedRealidades(prev => [...prev, item]);
                        
                        setDeck(prev => prev.filter(i => i.id !== item.id));
                        setActiveTip({ text: item.tip, setId: item.setId });
                        
                        if (!revealedTips.find(t => t.setId === item.setId)) {
                            setRevealedTips(prev => [...prev, { text: item.tip, setId: item.setId }]);
                        }

                        if (deck.length === 1) {
                            setTimeout(() => setGameState('finished'), 1500);
                        }
                    } else {
                        setScore(s => Math.max(0, s - 5));
                        setFeedback({ msg: '¡Incorrecto! Revisa la naturaleza del texto.', type: 'error' });
                        setTimeout(() => setFeedback(null), 1500);
                    }
                } catch (err) {
                    console.error("Error en el drop:", err);
                }
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="bg-white px-8 py-4 flex items-center justify-between shadow-md border-b-4" style={{ borderBottomColor: COLORS.naranja }}>
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 bg-[#F26522] rounded-full flex items-center justify-center text-white font-black text-xl shadow-lg">IUE</div>
                            <div>
                                <h1 className="text-xl font-black text-[#003366]">GESTIÓN DOCUMENTAL</h1>
                                <p className="text-[10px] uppercase font-bold tracking-widest text-gray-400">Mitos vs Realidades • Ley 594 de 2000</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-6">
                            <div className="text-right">
                                <span className="text-[10px] font-bold text-gray-400 uppercase block">Puntos</span>
                                <span className="text-3xl font-black text-[#003366]">{score}</span>
                            </div>
                            <button onClick={prepareGame} className="p-2 hover:bg-gray-100 rounded-full transition-colors">
                                <Icon name="RotateCcw" size={24} className="text-gray-400" />
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 p-6 max-w-[1400px] mx-auto w-full relative">
                        {gameState === 'intro' ? (
                            <div className="max-w-2xl mx-auto mt-12 bg-white p-12 rounded-3xl shadow-2xl text-center border-t-8 border-[#003366]">
                                <div className="mb-8 inline-flex p-6 rounded-full bg-orange-50 text-[#F26522]">
                                    <Icon name="BookOpen" size={64} />
                                </div>
                                <h2 className="text-4xl font-black mb-6 text-[#003366]">El Reto del Archivo</h2>
                                <p className="text-gray-600 text-lg mb-10 leading-relaxed">
                                    Clasifica los enunciados en la columna de <span className="font-bold text-[#F26522]">MITO</span> o <span className="font-bold text-[#003366]">REALIDAD</span>. 
                                    <br/><br/>
                                    Cada vez que aciertes, desbloquearás una <span className="font-bold text-[#8CC63F]">Regla de Oro</span> para tu gestión.
                                </p>
                                <button 
                                    onClick={() => setGameState('playing')}
                                    className="px-12 py-5 rounded-full text-white font-bold text-xl shadow-xl transition-all hover:scale-105 active:scale-95 flex items-center gap-3 mx-auto bg-[#F26522]"
                                >
                                    EMPEZAR AHORA <Icon name="ArrowRight" size={24} />
                                </button>
                            </div>
                        ) : gameState === 'playing' ? (
                            <div className="flex flex-col gap-8">
                                <div className="h-6 text-center">
                                    {feedback && (
                                        <span className="bg-red-500 text-white px-4 py-1 rounded-full text-xs font-bold">
                                            {feedback.msg}
                                        </span>
                                    )}
                                </div>

                                <div className="bg-white p-8 rounded-3xl shadow-inner border border-slate-100 relative overflow-hidden">
                                    <div className="absolute top-0 left-0 w-2 h-full bg-[#F26522]"></div>
                                    <h3 className="text-[10px] font-black text-gray-400 uppercase tracking-[0.3em] mb-6 text-center text-slate-500">Clasifica el siguiente elemento</h3>
                                    <div className="flex justify-center items-center min-h-[120px]">
                                        {deck.length > 0 ? (
                                            <div
                                                draggable
                                                onDragStart={(e) => onDragStart(e, deck[0])}
                                                className="p-8 bg-white border-4 rounded-2xl cursor-grab active:cursor-grabbing hover:shadow-2xl transition-all text-xl font-bold text-center max-w-2xl shadow-xl border-slate-100 text-[#003366]"
                                            >
                                                {deck[0].text}
                                            </div>
                                        ) : (
                                            <div className="text-gray-300 animate-pulse font-bold italic">¡Todo clasificado!</div>
                                        )}
                                    </div>
                                    <p className="text-center text-[10px] text-gray-300 mt-6 font-bold uppercase">Restan {deck.length} enunciados</p>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <div 
                                        onDragOver={(e) => e.preventDefault()}
                                        onDrop={(e) => onDrop(e, 'MITO')}
                                        className="bg-white rounded-3xl shadow-lg border-b-8 flex flex-col min-h-[400px] border-[#F26522]"
                                    >
                                        <div className="p-4 flex items-center justify-center gap-3 text-white rounded-t-3xl bg-[#F26522]">
                                            <Icon name="AlertCircle" size={20} />
                                            <h3 className="font-black text-sm uppercase tracking-widest">MITO</h3>
                                        </div>
                                        <div className="p-4 space-y-3 overflow-y-auto max-h-[400px]">
                                            {placedMitos.map((m, idx) => (
                                                <div key={m.id + idx} className="p-3 bg-orange-50 rounded-xl text-xs font-semibold text-orange-800 border border-orange-100 flex gap-2">
                                                    <Icon name="CheckCircle2" size={14} className="flex-shrink-0 text-[#8CC63F]" /> {m.text}
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <div 
                                        onDragOver={(e) => e.preventDefault()}
                                        onDrop={(e) => onDrop(e, 'REALIDAD')}
                                        className="bg-white rounded-3xl shadow-lg border-b-8 flex flex-col min-h-[400px] border-[#003366]"
                                    >
                                        <div className="p-4 flex items-center justify-center gap-3 text-white rounded-t-3xl bg-[#003366]">
                                            <Icon name="Gavel" size={20} />
                                            <h3 className="font-black text-sm uppercase tracking-widest text-white">REALIDAD (LEY 594)</h3>
                                        </div>
                                        <div className="p-4 space-y-3 overflow-y-auto max-h-[400px]">
                                            {placedRealidades.map((r, idx) => (
                                                <div key={r.id + idx} className="p-3 bg-blue-50 rounded-xl text-xs font-semibold text-blue-800 border border-blue-100 flex gap-2">
                                                    <Icon name="CheckCircle2" size={14} className="flex-shrink-0 text-[#8CC63F]" /> {r.text}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                <div className="mt-4">
                                    <h4 className="text-xs font-black text-gray-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                                        <Icon name="Lightbulb" size={16} className="text-yellow-500" /> Reglas de Oro Descubiertas ({revealedTips.length}/10)
                                    </h4>
                                    <div className="flex flex-wrap gap-2">
                                        {revealedTips.map((t, idx) => (
                                            <div key={t.setId + idx} className="px-3 py-2 bg-green-50 border border-green-200 text-green-700 text-[10px] font-bold rounded-lg flex items-center gap-2 max-w-xs truncate">
                                                <Icon name="CheckCircle2" size={12} /> {t.text}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="max-w-md mx-auto mt-12 bg-white p-12 rounded-3xl shadow-2xl text-center border-b-8 border-[#8CC63F]">
                                <Icon name="Trophy" size={80} className="text-yellow-500 mx-auto mb-6" />
                                <h2 className="text-3xl font-black mb-2 text-[#003366]">¡Líder de Archivo!</h2>
                                <p className="text-gray-500 mb-8">Has dominado los conceptos clave de la Ley 594 de 2000.</p>
                                <div className="bg-slate-50 p-6 rounded-2xl mb-8">
                                    <span className="text-[10px] font-black text-gray-400 uppercase block mb-1">Puntaje Final</span>
                                    <span className="text-6xl font-black text-[#F26522]">{score}</span>
                                </div>
                                <button 
                                    onClick={prepareGame}
                                    className="w-full py-5 rounded-full text-white font-bold text-lg shadow-lg hover:opacity-90 bg-[#003366]"
                                >
                                    REPETIR DESAFÍO
                                </button>
                            </div>
                        )}

                        {activeTip && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-blue-900/40 backdrop-blur-sm">
                                <div className="bg-white max-w-md w-full rounded-3xl shadow-2xl overflow-hidden border-t-8 border-[#8CC63F] modal-enter">
                                    <div className="p-8 text-center">
                                        <div className="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
                                            <Icon name="Lightbulb" size={32} />
                                        </div>
                                        <h3 className="text-xs font-black text-green-600 uppercase tracking-widest mb-2">Regla de Oro Descubierta</h3>
                                        <p className="text-gray-700 text-lg font-bold leading-relaxed mb-8 italic text-slate-700">
                                            "{activeTip.text}"
                                        </p>
                                        <button 
                                            onClick={() => setActiveTip(null)}
                                            className="px-8 py-3 rounded-full text-white font-bold shadow-md bg-[#8CC63F] hover:brightness-105"
                                        >
                                            ENTENDIDO
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="bg-white p-6 border-t border-slate-100 flex flex-col items-center gap-2">
                        <div className="flex items-center gap-4">
                            <div className="h-[2px] w-8 bg-[#F26522]"></div>
                            <p className="text-[10px] font-black text-gray-400 uppercase tracking-[0.4em]">Institución Universitaria de Envigado</p>
                            <div className="h-[2px] w-8 bg-[#003366]"></div>
                        </div>
                        <p className="text-[9px] text-gray-300 font-bold italic uppercase tracking-widest"> MMM  </p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
